kind = "web"
previewPath = "/"
title = "Tara Pokes"
version = "1.0.0"
id = "artifacts/tara-pokes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20860

[services.development]
run = "pnpm --filter @workspace/tara-pokes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tara-pokes", "run", "build" ]
publicDir = "artifacts/tara-pokes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20860"
BASE_PATH = "/"
